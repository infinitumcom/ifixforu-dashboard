<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Shield shape -->
  <path d="M100 10 C40 10, 15 40, 15 80 C15 140, 55 190, 100 210 C145 190, 185 140, 185 80 C185 40, 160 10, 100 10Z" fill="white"/>

  <!-- Letter F -->
  <rect x="45" y="60" width="18" height="95" rx="2" fill="#2196F3"/>
  <rect x="45" y="60" width="52" height="18" rx="2" fill="#2196F3"/>
  <rect x="45" y="90" width="38" height="14" rx="2" fill="#2196F3"/>

  <!-- Letter i (dot) -->
  <circle cx="82" cy="68" r="8" fill="#2196F3"/>
  <!-- Letter i (stem) -->
  <rect x="74" y="90" width="16" height="65" rx="2" fill="#2196F3"/>

  <!-- Screwdriver (going from top-right to bottom-left) -->
  <rect x="95" y="75" width="65" height="12" rx="3" fill="#1565C0" transform="rotate(-45 127 81)"/>
  <rect x="91" y="71" width="16" height="20" rx="3" fill="#1565C0" transform="rotate(-45 99 81)"/>
  <!-- Screwdriver tip -->
  <rect x="140" y="120" width="8" height="20" rx="1" fill="#1976D2" transform="rotate(-45 144 130)"/>

  <!-- Wrench (going from top-left to bottom-right) -->
  <rect x="95" y="75" width="65" height="12" rx="3" fill="#1976D2" transform="rotate(45 127 81)"/>
  <!-- Wrench head -->
  <circle cx="149" cy="113" r="14" fill="none" stroke="#1976D2" stroke-width="10" transform="rotate(45 127 81)"/>
</svg>
